<!DOCTYPE html>
<html>
<head>
  <title>Đăng ký</title>
</head>
<body>
  <h2>Form Đăng ký</h2>
  <input type="email" id="email" placeholder="Nhập email"><br>
  <input type="password" id="password" placeholder="Nhập mật khẩu"><br>
  <button onclick="signup()">Đăng ký</button>
  <p id="result"></p>

  <script>
    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const response = await fetch("http://localhost:3000/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, role: "user" })
      });

      const data = await response.json();
      document.getElementById("result").innerText = data.message || "Đăng ký xong!";
    }
  </script>
</body>
</html>
